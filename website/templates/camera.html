{% extends "base.html" %}
{% block title %}Camera{% endblock %}
{% block content %}
<input type="hidden" name="csrf_token" id="csrf_token" value="{{ csrf_token() }}">

<div class="container mt-5">
    <h2 class="text-center mb-4">Deteksi</h2>

    <!-- Toggle Switch -->
    <div class="d-flex justify-content-center align-items-center mb-4">
        <span class="me-3">Upload</span>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="mode-toggle" style="width: 3rem; height: 1.8rem;">
        </div>
        <span class="ms-3">Kamera</span>
    </div>

    <!-- Upload Section -->
    <div id="upload-section" class="text-center p-4 border rounded bg-light mb-4" style="display: none;">
        <h5>Unggah Gambar</h5>
        <p class="text-muted">Tarik dan lepas gambar di sini, atau klik untuk memilih</p>
        <div id="drop-area" class="border rounded p-5 mb-3 position-relative"
            style="cursor: pointer; background-color: #f8f9fa;">
            <input type="file" id="upload-input" accept="image/*" style="position: absolute; opacity: 0; inset: 0;">
            <span id="drop-text">Tarik & lepas gambar di sini</span>
            <img id="preview-img" class="img-fluid border rounded"
                style="max-height: 300px; display: none; margin: 0 auto;">
        </div>
        <button id="send-upload" class="btn btn-success" style="display: none;">Kirim ke Server</button>
    </div>

    <!-- Camera Section -->
    <div id="camera-section" class="text-center p-4 border rounded bg-light" style="display: none;">
        <h5>Kamera Langsung</h5>
        <div class="mb-3">
            <label for="camera-select" class="form-label">Pilih Kamera:</label>
            <select id="camera-select" class="form-select w-auto mx-auto"></select>
        </div>
        <div class="position-relative d-inline-block mb-3">
            <video id="video" width="700" height="394" autoplay playsinline class="img-fluid border rounded shadow-sm"
                style="display: block; width: 100%; max-width: 600px; height: auto;"></video>
            <canvas id="canvas" width="700" height="394" class="img-fluid border rounded shadow-sm"
                style="display: none; width: 100%; max-width: 600px; height: auto;"></canvas>
        </div>
        <div class="mt-3">
            <button id="capture" class="btn btn-primary">Capture Photo</button>
            <button id="send-camera" class="btn btn-success" style="display: none;">Kirim ke Server</button>
        </div>
    </div>

    <!-- Tombol Upload Ulang -->
    <div class="text-center mt-4" id="retry-button" style="display: none;">
        <button id="retry-upload" class="btn btn-warning btn-lg px-5">Upload Ulang Gambar</button>
    </div>
    <!-- Result Display -->
    <div id="result-component" class="mt-4 mx-auto flex-column flex-md-row" style="max-width: 1000px; display: none;">
        <div class="p-3 text-center" style="flex: 1;">
            <img id="result-img" class="img-fluid border rounded shadow-sm d-block mx-auto"
                style="max-height: 350px; object-fit: contain; background: #f8f9fa; display: none ;">
        </div>
        <div id="result-text" class="p-3" style="flex: 1;">
            <div id="result" class="alert alert-success" role="alert" style="display: none;"></div>
            <div id="result-detail" class="mt-4">
                <h4>Tindakan yang Disarankan</h4>
                <p id="result-recomendation"></p>
                <h4 class="mt-4">Deskripsi</h4>
                <p id="result-description"></p>
            </div>

        </div>
    </div>
</div>

<script>
    // === DOM Elements ===
    const modeToggle = document.getElementById('mode-toggle');
    const uploadSection = document.getElementById('upload-section');
    const cameraSection = document.getElementById('camera-section');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture');
    const sendCameraBtn = document.getElementById('send-camera');
    const uploadInput = document.getElementById('upload-input');
    const dropArea = document.getElementById('drop-area');
    const dropText = document.getElementById('drop-text');
    const previewImg = document.getElementById('preview-img');
    const sendUploadBtn = document.getElementById('send-upload');
    const resultDiv = document.getElementById('result');
    const resultRecomendationDiv = document.getElementById('result-recomendation');
    const resultDescriptionDiv = document.getElementById('result-description');
    const resultImg = document.getElementById('result-img');
    const retryButton = document.getElementById('retry-button');
    const cameraSelect = document.getElementById('camera-select');
    const csrfToken = document.getElementById('csrf_token').value;

    let imageData = null;
    let stream = null;

    // === Toggle Mode: Upload vs Camera ===
    modeToggle.addEventListener('change', async () => {
        if (modeToggle.checked) {
            // Camera mode
            uploadSection.style.display = 'none';
            cameraSection.style.display = 'block';

            // 🔥 Pastikan daftar kamera dimuat dulu
            await listCameras();

            // Setelah daftar kamera muncul, mulai kamera (dengan deviceId pertama)
            startCamera(); // startCamera() akan pakai cameraSelect.value jika ada
        } else {
            // Upload mode
            cameraSection.style.display = 'none';
            uploadSection.style.display = 'block';
            stopCamera();
        }
    });

    // === Camera Functions ===
    async function checkCameraPermission() {
        try {
            const permission = await navigator.permissions.query({ name: 'camera' });
            if (permission.state === 'denied') {
                alert('Izin kamera ditolak. Harap izinkan di pengaturan browser.');
            }
        } catch (e) {
            // Beberapa browser tidak mendukung permissions API
        }
    }
    async function listCameras() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            cameraSelect.innerHTML = '';
            videoDevices.forEach((device, i) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = device.label || `Kamera ${i + 1}`;
                cameraSelect.appendChild(option);
            });
            if (videoDevices.length > 0) {
                startCamera(videoDevices[0].deviceId);
            }
        } catch (err) {
            console.error('Gagal daftar kamera:', err);
        }
    }

    function startCamera(deviceId = null) {
        const targetDeviceId = deviceId || (cameraSelect.value ? cameraSelect.value : undefined);
        stopCamera();

        const constraints = {
            video: targetDeviceId ? { deviceId: { exact: targetDeviceId } } : true
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(mediaStream => {
                stream = mediaStream;
                video.srcObject = stream;
            })
            .catch(err => {
                alert('Tidak dapat mengakses kamera: ' + err.message);
            });
    }

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        video.srcObject = null;
    }

    cameraSelect.addEventListener('change', () => {
        startCamera(cameraSelect.value);
    });

    // Capture Photo
    captureBtn.addEventListener('click', () => {
        const ctx = canvas.getContext('2d');
        if (captureBtn.textContent === 'Capture Photo') {
            // Capture
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            imageData = canvas.toDataURL('image/png');
            video.style.display = 'none';
            canvas.style.display = 'block';
            captureBtn.textContent = 'Ambil Ulang';
            sendCameraBtn.style.display = 'inline-block';
        } else {
            // Reset
            canvas.style.display = 'none';
            video.style.display = 'block';
            captureBtn.textContent = 'Capture Photo';
            sendCameraBtn.style.display = 'none';
            imageData = null;
        }
    });

    // === Upload Functions (Drag & Drop) ===
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight() {
        dropArea.style.backgroundColor = '#e9ecef';
        dropText.textContent = "Lepaskan gambar di sini...";
    }

    function unhighlight() {
        dropArea.style.backgroundColor = '#f8f9fa';
        dropText.textContent = "Tarik & lepas gambar di sini";
    }

    dropArea.addEventListener('drop', handleDrop, false);
    function handleDrop(e) {
        const files = e.dataTransfer.files;
        if (files.length) handleFiles(files[0]);
    }

    uploadInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFiles(e.target.files[0]);
    });

    function handleFiles(file) {
        if (!file.type.match('image.*')) {
            alert('File harus berupa gambar.');
            return;
        }
        const reader = new FileReader();
        reader.onload = function (e) {
            previewImg.src = e.target.result;
            previewImg.style.display = 'block';
            dropText.style.display = 'none';
            imageData = e.target.result;
            sendUploadBtn.style.display = 'inline-block';
        };
        reader.readAsDataURL(file);
    }

    // === Loader Functions (using global-loader from base.html) ===
    function showLoader() {
        document.getElementById('global-loader').style.display = 'flex';
    }

    function hideLoader() {
        document.getElementById('global-loader').style.display = 'none';
    }

    // === Send Image to Server ===
    async function sendImageToServer(dataURL, source = 'upload') {
        if (!(await checkLoginStatus())) return;
        showLoader();

        try {
            const compressedImage = await resizeImage(dataURL);
            const response = await fetch('/process_image', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ image: compressedImage })
            });

            if (!response.ok) throw new Error('Gagal mengirim gambar');
            const result = await response.json();

            setTimeout(() => {
                hideLoader();
                showResult(result);
                hideInputSections(); // <-- Sembunyikan bagian input
                showRetryButton();
            }, 1500);

        } catch (error) {
            console.error('Error:', error);
            setTimeout(() => {
                hideLoader();
                showError(error.message);
                hideInputSections(); // <-- Sembunyikan bagian input saat error
                showRetryButton();
            }, 1500);
        }
    }

    // === Login Check ===
    async function checkLoginStatus() {
        try {
            const res = await fetch('/check_login', { credentials: 'same-origin' });
            const data = await res.json();
            if (!data.logged_in) {
                alert('Anda harus login terlebih dahulu.');
                window.location.href = '/auth/login';
                return false;
            }
            return true;
        } catch (error) {
            alert('Tidak dapat memeriksa status login.');
            window.location.href = '/auth/login';
            return false;
        }
    }

    // === Resize Image ===
    function resizeImage(dataURL, maxWidth = 640, maxHeight = 480) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxWidth) {
                        height *= maxWidth / width;
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width *= maxHeight / height;
                        height = maxHeight;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = dataURL;
        });
    }

    // === UI Functions ===
    function showResult(result) {
        // Tampilkan container hasil
        document.getElementById('result-component').style.display = 'flex';
        resultDiv.style.display = 'block';

        // Isi hasil deteksi
        resultDiv.innerHTML = `<strong>Hasil Deteksi:</strong> ${result.result || 'Penyakit Holer'}`;
        if (result.result == 'moler') {
            resultDiv.classList.remove('alert-success');
            resultDiv.classList.add('alert-danger');
            resultRecomendationDiv.innerHTML = `Segera lakukan penyemprotan pestisida alami dan pastikan drainase tanah baik.`;
            resultDescriptionDiv.innerHTML = `Penyakit moler pada daun bawang disebabkan oleh jamur atau bakteri, sering muncul di lingkungan lembap. Gejalanya daun layu, kuning, dan membusuk dari pangkal. Perlu penanganan cepat agar tidak menyebar.`;
        } else {
            resultDiv.classList.remove('alert-danger');
            resultDiv.classList.add('alert-success');
            resultRecomendationDiv.innerHTML = `Pertahankan kondisi tanam, siram secukupnya, dan tambah pupuk organik.`;
            resultDescriptionDiv.innerHTML = `Hasil deteksi menunjukkan daun bawang merah dalam keadaan sehat, tanpa adanya perubahan warna, bentuk, atau gejala penyakit moler.`;
        }


        // Tampilkan gambar jika ada
        if (result.saved_path) {
            resultImg.src = result.saved_path;
            resultImg.style.display = 'block';
        } else {
            resultImg.style.display = 'none';
        }

        // Tampilkan teks detail (default sudah ada di HTML)
    }

    function showError(message) {
        // Tampilkan container hasil
        document.getElementById('result-component').style.display = 'flex';

        // Isi pesan error
        resultDiv.innerHTML = `<strong>Error:</strong> ${message}`;
        resultDiv.classList.remove('alert-success');
        resultDiv.classList.add('alert-danger');
        resultDiv.style.display = 'block';

        resultImg.style.display = 'none';
    }

    function hideAllResults() {
        const resultComponent = document.getElementById('result-component');
        const resultDiv = document.getElementById('result');
        const resultImg = document.getElementById('result-img');

        resultComponent.style.display = 'none';
        resultDiv.style.display = 'none';
        resultImg.style.display = 'none';

        resultDiv.innerHTML = '';
        resultImg.src = '';
        resultImg.style.opacity = '0'; // Optional: animasi fade out
        resultComponent.style.opacity = '0';
        setTimeout(() => {
            resultComponent.style.display = 'none';
        }, 300);

        // Pastikan tidak ada style lain yang mengganggu
        resultComponent.removeAttribute('style'); // Hapus semua style
        resultDiv.removeAttribute('style');
        resultImg.removeAttribute('style');
    }

    // === Sembunyikan bagian input (upload & camera) saat hasil muncul ===
    function hideInputSections() {
        uploadSection.style.display = 'none';
        cameraSection.style.display = 'none';
        modeToggle.disabled = true; // Nonaktifkan toggle saat hasil muncul
    }

    // === Tampilkan ulang bagian input saat "Upload Ulang" diklik ===
    function showInputSections() {
        modeToggle.disabled = false;
        if (modeToggle.checked) {
            cameraSection.style.display = 'block';
            uploadSection.style.display = 'none';
        } else {
            uploadSection.style.display = 'block';
            cameraSection.style.display = 'none';
        }
    }

    function showRetryButton() {
        retryButton.style.display = 'block';
    }

    // === Retry Button ===
    retryButton.addEventListener('click', () => {
        // Reset semua
        stopCamera();
        imageData = null;
        retryButton.style.display = 'none';
        hideLoader();

        // Reset upload
        previewImg.style.display = 'none';
        dropText.style.display = 'block';
        dropText.textContent = "Tarik & lepas gambar di sini";
        sendUploadBtn.style.display = 'none';
        uploadInput.value = '';

        // Reset camera
        canvas.style.display = 'none';
        video.style.display = 'block';
        captureBtn.textContent = 'Capture Photo';
        sendCameraBtn.style.display = 'none';

        // Sembunyikan hasil
        hideAllResults(); // <-- Ini yang akan menyembunyikan seluruh #result-component

        // Default ke upload mode
        modeToggle.checked = false;

        // Tampilkan kembali bagian input
        showInputSections();
    });

    // === Initialize ===
    document.addEventListener('DOMContentLoaded', () => {
        checkCameraPermission();
        // Pastikan hasil disembunyikan saat load
        hideAllResults();

        // Default ke upload
        modeToggle.checked = false;
        uploadSection.style.display = 'block';
        cameraSection.style.display = 'none';

        // Event listeners
        sendCameraBtn.addEventListener('click', () => {
            if (imageData) sendImageToServer(imageData, 'camera');
        });

        sendUploadBtn.addEventListener('click', () => {
            if (imageData) sendImageToServer(imageData, 'upload');
        });
    });
</script>
{% endblock %}
